<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study With Me</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #cfe3f5;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #a8c6e8;
}

.navbar a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
}

/* Layout */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* Left menu */
.menu {
  width: 25%;
  background: #bcd4ec;
  padding: 20px;
  border-radius: 15px;
}

.menu a {
  display: block;
  margin: 8px 0;
  color: blue;
}

/* Center ToDo */
.todo {
  width: 35%;
  background: #dce7ea;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.todo input {
  padding: 10px;
  width: 70%;
}

.todo button {
  padding: 10px;
}

/* Right Pomodoro */
.timer {
  width: 35%;
  background: #f5f5f5;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.time {
  font-size: 50px;
  margin: 20px 0;
}

.start {
  background: red;
  color: white;
  padding: 10px 20px;
  border: none;
}

</style>
</head>

<body>

<div class="navbar">
  <div>NJEHI</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Study now</a>
    <a href="#">Services</a>
  </div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="menu">
    <h2>Study with me Menu</h2>
    <a href="#">Pomodoro timer</a>
    <a href="#">To do list</a>
    <a href="#">Ambient sound</a>
  </div>

  <!-- CENTER -->
  <div class="todo">
    <h2>To Do List</h2>
    <input type="text" placeholder="What needs to be done?">
    <button>+</button>
    <p>No tasks yet</p>
  </div>

  <!-- RIGHT -->
  <div class="timer">
    <h2>Pomodoro Timer</h2>
    <div class="time" id="time">25:00</div>
    <button class="start" onclick="startTimer()">START</button>
  </div>

</div>

<script>
let time = 1500; // 25 min

function startTimer() {
  setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("time").innerText =
      minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

    if (time > 0) time--;
  }, 1000);
}
</script>

</body>
</html>
